name: Nightly Build

on:
  workflow_dispatch:
    inputs:
      custom_version:
        description: "Custom version number (leave empty to auto-increment)"
        required: false
        default: ""

jobs:
  build_nightly:
    runs-on: windows-latest
    name: Build Nightly
    outputs:
      full_sha: ${{ steps.var.outputs.full_sha }}
      short_sha: ${{ steps.var.outputs.short_sha }}
      version_number: ${{ steps.set_version.outputs.version_number }}
      release_notes: ${{ steps.prepare_release.outputs.release_notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64
          toolset: 14.44
          
      - name: Generate CMake project
        run: cmake -D CMAKE_BUILD_TYPE=RelWithDebInfo -D FINAL=YES -S. -Bbuild -G Ninja

      - name: Determine Version Number
        id: set_version
        shell: bash
        run: |
          set -x
          
          namespace="ReturnOfModding"
          mod_name="ReturnOfModding"

          if [ -n "${{ github.event.inputs.custom_version }}" ]; then
            version_number="${{ github.event.inputs.custom_version }}"
          else
          # Get latest version number from thunderstore  
          version_number=$(curl --compressed -s "https://thunderstore.io/c/risk-of-rain-returns/api/v1/package/" | jq --arg package_name "$namespace-$mod_name" '.[]? | select(.full_name|startswith($package_name)) | .versions[0]?.version_number' || true)

          # If version_number is empty, set it to "1.0.0"  
          if [ -z "$version_number" ]; then
              version_number="1.0.0"
            fi

            # Remove quotes from output
            version_number=$(echo "$version_number" | tr -d '"')
            
            # Increment the patch version number
            version_number=$(echo $version_number | awk -F. -v OFS=. 'NF==1{print ++$NF}; NF>1{$NF=sprintf("%0*d", length($NF), ($NF+1)); print}')
          fi

          echo "version_number=$version_number" >> $GITHUB_OUTPUT

          # For the FILEVERSION file we want a , format
          version_number_comma=$(echo $version_number | tr . ,)
          
          cd src
          sed -i 's/FILEVERSION .*/FILEVERSION '"$version_number_comma"'/' resources.rc
          sed -i 's/PRODUCTVERSION .*/PRODUCTVERSION '"$version_number_comma"'/' resources.rc
          sed -i 's/"ProductVersion", *"[^"]*"/"ProductVersion", "'"$version_number"'"/g' resources.rc
          sed -i 's/VERSION_NUMBER = "[^"]*"/VERSION_NUMBER = "'"$version_number"'"/' version.hpp
          cd ..

      - name: Set up Git user
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Prepare release files
        run: |
          $version = $env:VERSION_NUMBER
          $date = Get-Date -Format "yyyy-MM-dd"

          # Read previous release hash
          if (Test-Path last_release_hash.txt) {
            $last_hash = (Get-Content last_release_hash.txt -Raw).Trim()
          } else {
            $last_hash = ""
          }

          # Current commit hash
          $current_hash = "${{ github.sha }}"

          # Get commits since last release
          if ($last_hash -ne "") {
            $commits = git log "$last_hash..$current_hash" --pretty=format:"- %s" --no-merges | Out-String
          } else {
            $commits = git log --pretty=format:"- %s" --no-merges | Out-String
          }

          $commits = $commits.Trim()
          if ([string]::IsNullOrWhiteSpace($commits)) {
            $commits = "- No changes since last release."
          }

          # Save current hash for next release
          Set-Content last_release_hash.txt $current_hash
          echo "HASH=$current_hash" >> $env:GITHUB_ENV

          # Export release notes
          echo "RELEASE_NOTES<<EOF" >> $env:GITHUB_OUTPUT
          echo "$commits" >> $env:GITHUB_OUTPUT
          echo "EOF" >> $env:GITHUB_OUTPUT

          # Update CHANGELOG.md
          $entry = ("## [{0}] - {1}`n`n{2}`n`n" -f $version, $date, $commits)
          if (Test-Path CHANGELOG.md) {
            $existing = Get-Content CHANGELOG.md -Raw
          } else {
            $existing = "# Changelog`n`n"
          }

          $newContent = $existing -replace "(?s)(# Changelog.*?\n)", "`$1`n$entry"
          if ($newContent -eq $existing) {
            $newContent = "$existing`n$entry"
          }

          Set-Content CHANGELOG.md $newContent

          # Commit changes
          git add CHANGELOG.md last_release_hash.txt
          git commit -m "Release v$version"
          git push
        env:
          VERSION_NUMBER: ${{ steps.set_version.outputs.version_number }}

      - name: Build 64bit release DLL
        run: |
          cmake --build ./build --config RelWithDebInfo --target ReturnOfModding --

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary
          path: |
            build/version.dll
            build/version.pdb
          
      - name: Generate Build Info
        id: var
        run: |
          echo "full_sha=$(git rev-parse HEAD)" >> $env:GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short HEAD)" >> $env:GITHUB_OUTPUT

  create_release:
    runs-on: ubuntu-latest
    name: Create Release
    needs: build_nightly
    steps:
      - uses: actions/checkout@v3

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: binary

      - name: Echo build sha256
        id: build_sha
        run: |
          sha256sum version.dll > sha256.checksum
          echo "build_sha=$(cat sha256.checksum)" >> $GITHUB_OUTPUT
          cat sha256.checksum

      - name: Delete Existing Release
        id: delete_release
        uses: actions/github-script@v6
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = "nightly";
      
            // List all releases and find the release by tag
            const releases = await github.rest.repos.listReleases({
              owner: owner,
              repo: repo,
            });
      
            const release = releases.data.find(release => release.tag_name === tag);
      
            // Check if the release exists and delete it
            if (release) {
              await github.rest.repos.deleteRelease({
                owner: owner,
                repo: repo,
                release_id: release.id,
              });
              console.log(`Deleted release with ID ${release.id}`);
            } else {
              console.log("No existing release to delete");
            }
      
            // Delete the tag
            try {
              await github.rest.git.deleteRef({
                owner: owner,
                repo: repo,
                ref: `tags/${tag}`,
              });
              console.log(`Deleted tag ${tag}`);
            } catch (error) {
              console.error(`Error deleting tag: ${error.message}`);
            }

      - name: Nightly Release
        uses: softprops/action-gh-release@v1
        with:
          name: Nightly [${{ needs.build_nightly.outputs.short_sha }}]
          tag_name: nightly
          body: |
            **Nightly Build Release**
            This release has been automatically generated by GitHub Actions.

            [View the workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

            **Version:** `${{ needs.build_nightly.outputs.version_number }}`

            **Changelog / Release Notes:**
            ${{ needs.build_nightly.outputs.release_notes }}

            **Build SHA256:**
            ```
            ${{ steps.build_sha.outputs.build_sha }}
            ```
            To verify the SHA256, download the build artifact and compare it with the above checksum.

            **Full Commit Hash:**
            ```
            ${{ needs.build_nightly.outputs.full_sha }}
            ```
          files: |
            version.dll

      - name: Setup dotnet
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 7.0.x

      - name: Setup TCLI
        run: dotnet tool install --global tcli

      - name: Thunderstore Release
        run: |
          set -x
          version_number="${{ needs.build_nightly.outputs.version_number }}"
          cd thunderstore
          sed -i 's/versionNumber = ".*"/versionNumber = "'"$version_number"'"/' thunderstore.toml
          tcli publish --token ${{ secrets.TCLI_AUTH_TOKEN }}
